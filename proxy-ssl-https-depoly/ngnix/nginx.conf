events {}

http {
  server {
    listen 80;
    server_name add.your.domain.here;

    location / {
      proxy_pass http://app:5000;
    }
  }

  server {
    listen 443 ssl;
    server_name add.your.domain.here;

    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/certs/privkey.pem;

    location / {
      proxy_pass http://app:5000;
    }
  }
}
